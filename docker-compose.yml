# K-Ray MVP Docker Compose 配置
#
# 使用方式：
#   1. 复制 .env.production.example 为 .env.production 并按需修改
#      cp .env.production.example .env.production
#   2. docker compose up -d --build
#   3. 访问 http://localhost:3000
#
# 环境变量优先级（从高到低）：
#   compose `environment` 段 > `env_file` 引用的文件 > Dockerfile ENV
# 本配置中 environment 段只保留必须固定的容器内路径，
# 业务可调项（MARKET_DATA_MODE 等）从 .env.production 读取，未配置时使用 Dockerfile 默认值。

services:
  k-ray:
    build:
      context: .
      dockerfile: Dockerfile
    image: k-ray-mvp:2026-07-14
    container_name: k-ray-mvp
    ports:
      - "3000:3000"
    # 从 .env.production 读取用户可调环境变量
    # 文件不存在时 compose 会报警告，需先从 .env.production.example 复制
    env_file:
      - path: .env.production
        required: false
    environment:
      # 容器内固定路径（不通过 env_file 覆盖，避免误配置导致 BaoStock 找不到解释器）
      - BAOSTOCK_PYTHON_PATH=/opt/venv/bin/python
      - BAOSTOCK_SCRIPT_PATH=/app/scripts/baostock_client.py
      - BAOSTOCK_STOCK_INFO_SCRIPT_PATH=/app/scripts/baostock_stock_info.py
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    # 内存限制建议 ≥512MB（Next.js + Python 子进程）
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
